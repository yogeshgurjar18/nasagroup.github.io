<!DOCTYPE html>
<html>
<head>
<title>NASA Agents Network</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{color:red}
h2{color:orange}

.box{
border:2px solid red;
padding:20px;
margin:20px auto;
width:90%;
max-width:500px;
}

input{
padding:10px;
margin:5px;
background:black;
border:1px solid red;
color:white;
}

button{
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
margin:5px;
}

.hidden{display:none}

#chatBox{
height:250px;
overflow:auto;
border:1px solid red;
padding:10px;
margin-bottom:10px;
text-align:left;
}

</style>
</head>

<body>

<div class="box" id="home">

<h2>RESTRICTED ACCESS</h2>

<button onclick="openMember()">MEMBER LOGIN</button><br>
<button onclick="openAdmin()">ADMIN LOGIN</button><br>
<button onclick="openJoin()">JOIN NASA</button>

</div>


<div class="box hidden" id="memberLogin">

<h2>Member Login</h2>

<input id="mu" placeholder="username"><br>
<input id="mp" type="password" placeholder="password"><br>

<button onclick="memberLogin()">LOGIN</button>

</div>


<div class="box hidden" id="adminLogin">

<h2>Admin Login</h2>

<input id="au" placeholder="username"><br>
<input id="ap" type="password" placeholder="password"><br>

<button onclick="adminLogin()">LOGIN</button>

</div>


<div class="box hidden" id="joinForm">

<h2>Join Request</h2>

<input id="jname" placeholder="Your Name"><br>
<input id="jinsta" placeholder="Instagram Link"><br>

<button onclick="sendReq()">SEND REQUEST</button>

<p id="joinMsg"></p>

</div>


<div id="memberPage" class="hidden">

<h1>WELCOME AGENTS</h1>

<div class="box">

<h2>Members</h2>

<div id="members"></div>

</div>


<div class="box">

<h2>Agents Chat Room</h2>

<div id="chatBox"></div>

<input id="chatName" placeholder="Your Name"><br>
<input id="chatMsg" placeholder="Message"><br>

<button onclick="sendMsg()">SEND</button>

</div>

</div>


<div id="adminPage" class="hidden">

<h1>ADMIN PANEL</h1>

<div class="box">

<h2>Join Requests</h2>

<div id="reqs"></div>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>


<script>

firebase.initializeApp({
apiKey:"AIzaSyAv62hu_uVwtB0xt16fNXkMYo0zbjmc-iI",
authDomain:"yogesh-1287e.firebaseapp.com",
databaseURL:"https://yogesh-1287e-default-rtdb.firebaseio.com",
projectId:"yogesh-1287e"
});

var db=firebase.database();

function hideAll(){

home.classList.add("hidden")
memberLogin.classList.add("hidden")
adminLogin.classList.add("hidden")
joinForm.classList.add("hidden")
memberPage.classList.add("hidden")
adminPage.classList.add("hidden")

}

function openMember(){hideAll();memberLogin.classList.remove("hidden")}
function openAdmin(){hideAll();adminLogin.classList.remove("hidden")}
function openJoin(){hideAll();joinForm.classList.remove("hidden")}



function memberLogin(){

if(mu.value==="nasa" && mp.value==="agent123"){

hideAll()

memberPage.classList.remove("hidden")

loadMembers()

loadChat()

}

else alert("Access Denied")

}



function adminLogin(){

if(au.value==="yogesh" && ap.value==="90351396"){

hideAll()

adminPage.classList.remove("hidden")

loadRequests()

}

else alert("Access Denied")

}



function sendReq(){

if(!jname.value || !jinsta.value) return

db.ref("requests").push({
name:jname.value,
insta:jinsta.value
})

joinMsg.innerHTML="Request Sent"

jname.value=""
jinsta.value=""

}



function loadRequests(){

db.ref("requests").on("value",snap=>{

reqs.innerHTML=""

snap.forEach(c=>{

let r=c.val()

reqs.innerHTML+=`

<p>

<b>${r.name}</b><br>

<a href="${r.insta}" target="_blank">Instagram</a><br>

<button onclick="approve('${c.key}','${r.name}','${r.insta}')">APPROVE</button>

<button onclick="reject('${c.key}')">REJECT</button>

</p>

`

})

})

}



function approve(id,name,insta){

db.ref("members").push({name,insta})

db.ref("requests/"+id).remove()

}



function reject(id){

db.ref("requests/"+id).remove()

}



function loadMembers(){

db.ref("members").on("value",snap=>{

members.innerHTML=""

snap.forEach(c=>{

let m=c.val()

members.innerHTML+=`

<p>

<b>${m.name}</b><br>

<a href="${m.insta}" target="_blank">Instagram</a>

</p>

`

})

})

}



function sendMsg(){

let name=document.getElementById("chatName").value
let msg=document.getElementById("chatMsg").value

if(!name || !msg) return

db.ref("chat").push({
name:name,
msg:msg
})

chatMsg.value=""

}



function loadChat(){

db.ref("chat").on("child_added",snap=>{

let m=snap.val()

chatBox.innerHTML+=`<p><b>${m.name}:</b> ${m.msg}</p>`

chatBox.scrollTop=chatBox.scrollHeight

})

}

</script>

</body>
</html>
