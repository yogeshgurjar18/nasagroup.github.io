<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NASA Agents Network</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

.box{
border:2px solid red;
padding:20px;
margin:30px auto;
width:90%;
max-width:500px;
}

input{
padding:10px;
margin:5px;
width:80%;
background:black;
border:1px solid red;
color:white;
}

button{
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
margin:5px;
}

.hidden{
display:none;
}

#chatBox{
height:250px;
overflow:auto;
border:1px solid red;
padding:10px;
margin-bottom:10px;
text-align:left;
}

.member{
display:flex;
align-items:center;
gap:15px;
margin:15px 0;
font-size:18px;
}

.member img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:2px solid red;
}

</style>
</head>


<body>


<div class="box" id="home">

<h2>RESTRICTED ACCESS</h2>

<button onclick="showMember()">MEMBER LOGIN</button><br>
<button onclick="showAdmin()">ADMIN LOGIN</button><br>
<button onclick="showJoin()">JOIN NASA</button>

</div>



<div class="box hidden" id="memberLogin">

<h2>Member Login</h2>

<input id="memberUser" placeholder="Username"><br>
<input id="memberPass" type="password" placeholder="Password"><br>

<button onclick="memberLogin()">LOGIN</button>

</div>



<div class="box hidden" id="adminLogin">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username"><br>
<input id="adminPass" type="password" placeholder="Password"><br>

<button onclick="adminLogin()">LOGIN</button>

</div>



<div class="box hidden" id="joinBox">

<h2>Join NASA</h2>

<input id="joinName" placeholder="Your Name"><br>
<input id="joinPhoto" placeholder="Photo Link"><br>

<button onclick="sendRequest()">SEND REQUEST</button>

<p id="joinMsg"></p>

</div>



<div id="memberPage" class="hidden">

<div class="box">

<h3>Members</h3>

<div id="members"></div>

</div>


<div class="box">

<h3>Agents Chat</h3>

<div id="chatBox"></div>

<input id="chatName" placeholder="Your Name"><br>
<input id="chatMessage" placeholder="Message"><br>

<button onclick="sendMessage()">SEND</button>

</div>

</div>



<div id="adminPage" class="hidden">

<div class="box">

<h3>Join Requests</h3>

<div id="requests"></div>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

firebase.initializeApp({
apiKey: "AIzaSyD2WKDfowk39ml_kwp53a8uIn6YU9jv-RU",
authDomain: "nasa-chat-2a4c1.firebaseapp.com",
databaseURL: "https://nasa-chat-2a4c1-default-rtdb.firebaseio.com",
projectId: "nasa-chat-2a4c1",
storageBucket: "nasa-chat-2a4c1.firebasestorage.app",
messagingSenderId: "922724250887",
appId: "1:922724250887:web:10dc41aef33da70b5401a2"
});

var db=firebase.database();

function hideAll(){
document.getElementById("home").classList.add("hidden")
document.getElementById("memberLogin").classList.add("hidden")
document.getElementById("adminLogin").classList.add("hidden")
document.getElementById("joinBox").classList.add("hidden")
document.getElementById("memberPage").classList.add("hidden")
document.getElementById("adminPage").classList.add("hidden")
}

function showMember(){
hideAll()
document.getElementById("memberLogin").classList.remove("hidden")
}

function showAdmin(){
hideAll()
document.getElementById("adminLogin").classList.remove("hidden")
}

function showJoin(){
hideAll()
document.getElementById("joinBox").classList.remove("hidden")
}



function memberLogin(){

let u=document.getElementById("memberUser").value
let p=document.getElementById("memberPass").value

if(u==="nasa" && p==="agent123"){

hideAll()
document.getElementById("memberPage").classList.remove("hidden")

loadMembers()
loadChat()

}
else{
alert("Access Denied")
}

}



function adminLogin(){

let u=document.getElementById("adminUser").value
let p=document.getElementById("adminPass").value

if(u==="yogesh" && p==="90351396"){

hideAll()
document.getElementById("adminPage").classList.remove("hidden")

loadRequests()

}
else{
alert("Access Denied")
}

}



function sendRequest(){

let name=document.getElementById("joinName").value
let photo=document.getElementById("joinPhoto").value

db.ref("requests").push({
name:name,
photo:photo
})

document.getElementById("joinMsg").innerHTML="Request Sent"

}



function loadRequests(){

db.ref("requests").on("value",function(snapshot){

let container=document.getElementById("requests")
container.innerHTML=""

snapshot.forEach(function(child){

let r=child.val()

container.innerHTML+=`

<p>

<img src="${r.photo}" width="60"><br>

<b>${r.name}</b><br>

<button onclick="approve('${child.key}','${r.name}','${r.photo}')">APPROVE</button>

<button onclick="reject('${child.key}')">REJECT</button>

</p>

`

})

})

}



function approve(id,name,photo){

db.ref("members").push({
name:name,
photo:photo
})

db.ref("requests/"+id).remove()

}



function reject(id){
db.ref("requests/"+id).remove()
}



function loadMembers(){

db.ref("members").on("value",function(snapshot){

let box=document.getElementById("members")
box.innerHTML=""

snapshot.forEach(function(child){

let m=child.val()

box.innerHTML+=`

<div class="member">

<img src="${m.photo}">

<b>${m.name}</b>

</div>

`

})

})

}



function sendMessage(){

let name=document.getElementById("chatName").value
let msg=document.getElementById("chatMessage").value

db.ref("chat").push({
name:name,
msg:msg
})

document.getElementById("chatMessage").value=""

}



function loadChat(){

db.ref("chat").on("child_added",function(snapshot){

let m=snapshot.val()

let box=document.getElementById("chatBox")

box.innerHTML+=`<p><b>${m.name}:</b> ${m.msg}</p>`

})

}

</script>


</body>
</html>
