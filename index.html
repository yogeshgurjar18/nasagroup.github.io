<!DOCTYPE html>
<html>
<head>
<title>NASA Agents Network</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

.box{
border:2px solid red;
padding:20px;
margin:40px auto;
width:90%;
max-width:500px;
}

input{
padding:10px;
margin:5px;
background:black;
border:1px solid red;
color:white;
}

button{
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
margin:5px;
}

.hidden{display:none}

#chatBox{
height:250px;
overflow:auto;
border:1px solid red;
padding:10px;
margin-bottom:10px;
text-align:left;
}

.member{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.member img{
width:40px;
height:40px;
border-radius:50%;
}

</style>
</head>

<body>

<div class="box" id="home">
<h2>RESTRICTED ACCESS</h2>

<button onclick="openMember()">MEMBER LOGIN</button><br>
<button onclick="openAdmin()">ADMIN LOGIN</button><br>
<button onclick="openJoin()">JOIN NASA</button>

</div>


<div class="box hidden" id="memberLogin">
<h2>Member Login</h2>

<input id="mu" placeholder="Username"><br>
<input id="mp" type="password" placeholder="Password"><br>

<button onclick="memberLogin()">LOGIN</button>

</div>


<div class="box hidden" id="adminLogin">
<h2>Admin Login</h2>

<input id="au" placeholder="Username"><br>
<input id="ap" type="password" placeholder="Password"><br>

<button onclick="adminLogin()">LOGIN</button>

</div>


<div class="box hidden" id="joinForm">
<h2>Join NASA</h2>

<input id="jname" placeholder="Your Name"><br>
<input id="jphoto" placeholder="Photo Link"><br>

<button onclick="sendReq()">SEND REQUEST</button>

<p id="joinMsg"></p>

</div>


<div id="memberPage" class="hidden">

<div class="box">

<h3>Members</h3>

<div id="members"></div>

</div>


<div class="box">

<h3>Agents Chat</h3>

<div id="chatBox"></div>

<input id="chatName" placeholder="Your Name"><br>
<input id="chatMsg" placeholder="Message"><br>

<button onclick="sendMsg()">SEND</button>

</div>

</div>


<div id="adminPage" class="hidden">

<div class="box">

<h3>Join Requests</h3>

<div id="reqs"></div>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>


<script>

firebase.initializeApp({
apiKey: "AIzaSyD2WKDfowk39ml_kwp53a8uIn6YU9jv-RU",
authDomain: "nasa-chat-2a4c1.firebaseapp.com",
databaseURL: "https://nasa-chat-2a4c1-default-rtdb.firebaseio.com",
projectId: "nasa-chat-2a4c1",
storageBucket: "nasa-chat-2a4c1.firebasestorage.app",
messagingSenderId: "922724250887",
appId: "1:922724250887:web:10dc41aef33da70b5401a2"
});

var db = firebase.database();

function hideAll(){
document.getElementById("home").classList.add("hidden")
document.getElementById("memberLogin").classList.add("hidden")
document.getElementById("adminLogin").classList.add("hidden")
document.getElementById("joinForm").classList.add("hidden")
document.getElementById("memberPage").classList.add("hidden")
document.getElementById("adminPage").classList.add("hidden")
}

function openMember(){
hideAll()
document.getElementById("memberLogin").classList.remove("hidden")
}

function openAdmin(){
hideAll()
document.getElementById("adminLogin").classList.remove("hidden")
}

function openJoin(){
hideAll()
document.getElementById("joinForm").classList.remove("hidden")
}

function memberLogin(){

let u=document.getElementById("mu").value
let p=document.getElementById("mp").value

if(u==="nasa" && p==="agent123"){

hideAll()
document.getElementById("memberPage").classList.remove("hidden")

loadMembers()
loadChat()

}

else alert("ACCESS DENIED")

}

function adminLogin(){

let u=document.getElementById("au").value
let p=document.getElementById("ap").value

if(u==="yogesh" && p==="90351396"){

hideAll()
document.getElementById("adminPage").classList.remove("hidden")

loadRequests()

}

else alert("ACCESS DENIED")

}

function sendReq(){

let name=document.getElementById("jname").value
let photo=document.getElementById("jphoto").value

db.ref("requests").push({
name:name,
photo:photo
})

document.getElementById("joinMsg").innerHTML="Request Sent"

}

function loadRequests(){

db.ref("requests").on("value",snap=>{

let reqs=document.getElementById("reqs")

reqs.innerHTML=""

snap.forEach(c=>{

let r=c.val()

reqs.innerHTML+=`

<p>

<img src="${r.photo}" width="40">

<b>${r.name}</b><br>

<button onclick="approve('${c.key}','${r.name}','${r.photo}')">APPROVE</button>

<button onclick="reject('${c.key}')">REJECT</button>

</p>

`

})

})

}

function approve(id,name,photo){

db.ref("members").push({name,photo})

db.ref("requests/"+id).remove()

}

function reject(id){

db.ref("requests/"+id).remove()

}

function loadMembers(){

db.ref("members").on("value",snap=>{

let members=document.getElementById("members")

members.innerHTML=""

snap.forEach(c=>{

let m=c.val()

members.innerHTML+=`

<div class="member">

<img src="${m.photo}">

<b>${m.name}</b>

</div>

`

})

})

}

function sendMsg(){

let name=document.getElementById("chatName").value
let msg=document.getElementById("chatMsg").value

db.ref("chat").push({
name:name,
msg:msg
})

document.getElementById("chatMsg").value=""

}

function loadChat(){

db.ref("chat").on("child_added",snap=>{

let m=snap.val()

let box=document.getElementById("chatBox")

box.innerHTML+=`<p><b>${m.name}:</b> ${m.msg}</p>`

})

}

</script>

</body>
</html>
